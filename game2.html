<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>토끼 러닝 게임 DAY & NIGHT 🐰</title>
<style>
body{
  margin:0;
  text-align:center;
  font-family:sans-serif;
}
canvas{
  border:3px solid black;
  margin-top:10px;
}
</style>
</head>
<body>

<h2>🐰 토끼 러닝 게임 (스페이스 / 터치 = 점프)</h2>
<canvas id="game" width="800" height="300"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let gravity = 0.7;
let speed = 6;
let score = 0;
let frame = 0;
let gameOver = false;

const groundY = 220;

/* ======================
   ⏰ 시간 (0~1)
====================== */
let time = 0; // 0=낮, 0.5=밤

/* ======================
   토끼
====================== */
const rabbit = {
  x:80,
  y:groundY-40,
  w:45,
  h:45,
  hitW:28,
  hitH:28,
  dy:0,
  jumping:false
};

const obstacles = [];

/* ======================
   🌌 배경 (낮/밤)
====================== */
function drawSky(){
  time += 0.0003;
  if(time > 1) time = 0;

  const isNight = time > 0.5;

  const g = ctx.createLinearGradient(0,0,0,300);
  if(!isNight){
    g.addColorStop(0,"#6ec6ff");
    g.addColorStop(1,"#eaf9ff");
  }else{
    g.addColorStop(0,"#0b1d3a");
    g.addColorStop(1,"#1c2c54");
  }
  ctx.fillStyle = g;
  ctx.fillRect(0,0,800,300);

  // 태양 / 달 위치
  const angle = time * Math.PI * 2;
  const cx = 400 + Math.cos(angle - Math.PI/2) * 300;
  const cy = 180 + Math.sin(angle - Math.PI/2) * 120;

  ctx.beginPath();
  ctx.fillStyle = isNight ? "#f5f3ce" : "#ffd93b";
  ctx.arc(cx, cy, 20, 0, Math.PI*2);
  ctx.fill();

  // 별
  if(isNight){
    ctx.fillStyle="white";
    for(let i=0;i<30;i++){
      ctx.fillRect((i*73)%800, (i*41)%150, 2, 2);
    }
  }
}

/* ======================
   잔디
====================== */
function drawGround(){
  ctx.fillStyle="#3cb043";
  ctx.fillRect(0,groundY,800,15);
  ctx.fillStyle="#8B5A2B";
  ctx.fillRect(0,groundY+15,800,80);
}

/* ======================
   토끼 그리기
====================== */
function drawRabbit(){
  ctx.save();
  ctx.translate(rabbit.x, rabbit.y);

  ctx.fillStyle="white";

  ctx.beginPath();
  ctx.ellipse(22,28,20,15,0,0,Math.PI*2);
  ctx.fill();

  ctx.beginPath();
  ctx.arc(38,20,12,0,Math.PI*2);
  ctx.fill();

  ctx.fillRect(34,-5,6,15);
  ctx.fillRect(42,-5,6,15);

  ctx.fillStyle="black";
  ctx.fillRect(42,18,3,3);

  ctx.fillStyle="white";
  if(rabbit.jumping){
    ctx.fillRect(8,40,25,6);
  }else{
    if(frame%20<10){
      ctx.fillRect(5,40,10,6);
      ctx.fillRect(25,40,10,6);
    }else{
      ctx.fillRect(15,40,10,6);
      ctx.fillRect(30,40,10,6);
    }
  }

  ctx.restore();
}

/* ======================
   🪨 실제 바위 모양
====================== */
function drawRock(o){
  ctx.fillStyle="#555";
  ctx.beginPath();
  ctx.moveTo(o.x+5, o.y+o.h);
  ctx.lineTo(o.x+o.w*0.2, o.y+o.h*0.6);
  ctx.lineTo(o.x+o.w*0.4, o.y+o.h*0.3);
  ctx.lineTo(o.x+o.w*0.7, o.y+o.h*0.4);
  ctx.lineTo(o.x+o.w-5, o.y+o.h);
  ctx.closePath();
  ctx.fill();
}

/* ======================
   정확 충돌 판정
====================== */
function hit(r,o){
  const rx = r.x + 8;
  const ry = r.y + 10;
  return (
    rx < o.x + o.hit &&
    rx + r.hitW > o.x &&
    ry < o.y + o.hit &&
    ry + r.hitH > o.y
  );
}

/* ======================
   입력
====================== */
function jump(){
  if(!rabbit.jumping && !gameOver){
    rabbit.dy = -13;
    rabbit.jumping = true;
  }
  if(gameOver) restart();
}
document.addEventListener("keydown",e=>{
  if(e.code==="Space") jump();
});
canvas.addEventListener("touchstart",jump);

/* ======================
   바위 생성
====================== */
function createObstacle(){
  const size = 45 + Math.random()*20;
  obstacles.push({
    x:800,
    y:groundY-size,
    w:size,
    h:size,
    hit:size*0.7
  });
}
setInterval(()=>{
  if(!gameOver) createObstacle();
},1200);

/* ======================
   루프
====================== */
function update(){
  frame++;

  drawSky();
  drawGround();

  rabbit.dy += gravity;
  rabbit.y += rabbit.dy;
  if(rabbit.y > groundY-40){
    rabbit.y = groundY-40;
    rabbit.dy = 0;
    rabbit.jumping = false;
  }

  drawRabbit();

  obstacles.forEach((o,i)=>{
    o.x -= speed;
    drawRock(o);
    if(hit(rabbit,o)) gameOver = true;
    if(o.x+o.w < 0) obstacles.splice(i,1);
  });

  if(!gameOver){
    score++;
    speed += 0.002;
  }

  ctx.fillStyle="black";
  ctx.font="18px Arial";
  ctx.fillText("점수: "+score,10,25);

  if(gameOver){
    ctx.font="40px Arial";
    ctx.fillText("게임 오버!",270,120);
    ctx.font="20px Arial";
    ctx.fillText("스페이스 / 터치로 재시작",220,160);
  }

  requestAnimationFrame(update);
}

function restart(){
  score=0;
  speed=6;
  obstacles.length=0;
  gameOver=false;
}

update();
</script>

</body>
</html>
